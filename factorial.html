<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factorial</title>
</head>
<body>
  <h2 style="margin:20px 0; text-align: center;">Factorial</h2>
  <p style="text-align: center;">Look at the Console</p>
  <script>
    //1'den başlayarak belirli bir sayma sayısına kadar olan sayıların çarpımına o sayının faktöriyeli denir.
    const factorial = (x) => {
      let result = 1
      for (let i = 2; i < x; i++) {
        console.log(result + '*' + i)
        result = result * i
      }
      return result
    }
    console.log('Result: ' + factorial(5))
  </script>
</body>
</html>
