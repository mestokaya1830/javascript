<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fibinacci Sequence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #container {
      display: flex;
      flex-direction: column;
      width: 220px;
      margin: 0 auto;
    }

    #list {
      display: flex;
      flex-direction: column;
      list-style: none;
    }

    #list li {
      margin: 8px;
    }

    label {
      margin: 5px 0;
    }
  </style>
</head>

<body>
  <h2 style="margin: 20px; text-align: center;">Fibinacci Sequence</h2>
  <p style="margin: 10px; text-align: center;">Look at the Concole</p>


  <script>
    const fibinacci = (num) => {
      let array = [0, 1]
      while (num > 1) {
        const [prev, last] = array.slice(-2)
        array.push(prev + last)
        num -= 1//stop condition
      }
      return array
    }
    console.log(fibinacci(6))

    //or
    const fibinacci2 = (num) => {
      let x = 0
      let y = 1
      let result
      for (let i = 1; i < num; i++) {
        result = x + y
        x = y
        y = result
        console.log(result)
      }
    }
    fibinacci2(6)
  </script>
</body>

</html>
