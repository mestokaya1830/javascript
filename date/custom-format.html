<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Format</title>
  <style>
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      min-width: 300px;
      width: fit-content;
      margin: 20px auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
    }

    #container input {
      width: 80px;
      padding: 4px;
      height: 14px;
    }
  </style>
</head>

<body>
  <form action="">

    <h2 style="margin: 10px; text-align: center;">Custom Format</h2>
    <p style="margin: 10px; text-align: center;">Look at the Concole</p>
    <div id="container">
      <h2>Date Format</h2>
      <div>
        <input type="text" id="date-format" placeholder="format">
        <input type="text" maxlength="1" id="style" placeholder="style" pattern="[0-9]+" >
      </div>
      <h4 id="result"></h4>
    </div>
  </form>
  <script>
    document.getElementById('style').addEventListener('keyup', (e) => {
      const format = document.getElementById('date-format')
      let result = document.getElementById('result')
      let cd = new Date(Date.parse('01/05/2023 23:20:15'))
  
      const F = cd.toLocaleTimeString()
      const Y = cd.getFullYear()
      let MON = cd.getMonth() + 1
      const DW = cd.getDay()
      let D = cd.getDate()
      const T = cd.toLocaleTimeString()
      const H = cd.getHours()
      let M = cd.getMinutes()
      const S = cd.getSeconds()
  
      if (MON < 9) MON = '0' + MON
      if (D < 9) D = '0' + D

      if(!format.value) {
        alert('Please enter data-format')
        format.focus()
        return
      }

      let style = e.target.value || '/'
      if(style.match(/[^\/\.\-\:]/g)){
        return true
      }

      const times = {
        D:D,
        MON: MON,
        Y: Y,
        DM: `${D}${style}${MON}`,
        MD: `${MON}${style}${D}`,
        MY: `${MON}${style}${Y}`,
        DMY: `${D}${style}${MON}${style}${Y}`,
        MDY: `${MON}${style}${D}${style}${Y}`,
        YMD: `${Y}${style}${MON}${style}${D}`,
        T: T,
        H: H,
        M:M,
        HM: `${H}:${M}`,
        MS: `${M}:${S}`,
        F: `${D}${style}${M}${style}${Y} ${F}`,
        DW: DW
      }
      result.innerText = times[format.value.toUpperCase()]
    })


  </script>
</body>

</html>
