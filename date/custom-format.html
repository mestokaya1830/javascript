<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Format</title>
  <style>
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      min-width: 300px;
      width: fit-content;
      margin: 20px auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
    }

    #container input {
      width: 80px;
      padding: 4px;
      height: 14px;
    }
  </style>
</head>

<body>
  <h2 style="margin: 10px; text-align: center;">Custom Format</h2>
  <p style="margin: 10px; text-align: center;">Look at the Concole</p>
  <div id="container">
    <h2>Date Format</h2>
    <div>
      <input type="text" id="date-format" placeholder="format">
      <input type="text" id="style" placeholder="style">
    </div>

    <h4 id="result"></h4>
  </div>
  <script>
    const dateFormat = document.getElementById('date-format')
    let style = document.getElementById('style')
    let result = document.getElementById('result')
    let cd = new Date(Date.parse('01/05/2023 23:20:15'))

    const F = cd.toLocaleTimeString()
    const Y = cd.getFullYear()
    let MON = cd.getMonth() + 1
    const DW = cd.getDay()
    let D = cd.getDate()
    const T = cd.toLocaleTimeString()
    const H = cd.getHours()
    let M = cd.getMinutes()
    const S = cd.getSeconds()

    if (MON < 9) MON = '0' + MON
    if (D < 9) D = '0' + D
    let settingDate = ''

    const setFormat = (format, style) => {
      if (style != '') {
      } else {
        style = ''
      }
      switch (format.toUpperCase()) {
        case 'D':
          settingDate = `${D}`
          break;
        case 'MON':
          settingDate = `${MON}`
          break;
        case 'Y':
          settingDate = `${Y}`
          break;
        case 'DM':
          settingDate = `${D}${style}${MON}`
          break;
        case 'MY':
          settingDate = `${MON}${style}${Y}`
          break;
        case 'DMY':
          settingDate = `${D}${style}${MON}${style}${Y}`
          break;
        case 'MDY':
          settingDate = `${MON}${style}${D}${style}${Y}`
          break;
        case 'YMD':
          settingDate = `${Y}${style}${MON}${style}${D}`
          break;
        case 'T':
          settingDate = `${T}`
          break;
        case 'H':
          settingDate = `${H}`
          break;
        case 'M':
          settingDate = `${M}`
          break;
        case 'HM':
          settingDate = `${H}:${M}`
          break;
        case 'MS':
          settingDate = `${M}:${S}`
          break;
        case 'F':
          settingDate = `${D}${style}${M}${style}${Y} ${F}`
          break;
        case 'DW':
          settingDate = `${DW}`
          break;

        default:
          break;
          settingDate = ''
      }
      result.innerText = settingDate
    }

    dateFormat.addEventListener('keyup', (e) => {
      if (e.target.value == '') {
        result.innerText = ''
      } else {
        setFormat(dateFormat.value, style.value)
      }
    })
    style.addEventListener('keyup', (e) => {
      setFormat(dateFormat.value, style.value)
    })

    let months = [
      "Ocak",
      "Şubat",
      "Mart",
      "Nisan",
      "Mayıs",
      "Haziran",
      "Temmuz",
      "Agustos",
      "Eylül",
      "Ekim",
      "Kasım",
      "Aralık",
    ];
    let days = ["Paz", "Pazs", "Salı", "Çar", "Per", "Cum", "Cums"];
    console.log(
      months[cd.getMonth() + 1] +
      "-" +
      days[cd.getDay()] +
      "-" +
      cd.getFullYear()
    )
  </script>
</body>

</html>
