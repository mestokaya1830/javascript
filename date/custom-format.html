<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Format</title>
</head>

<body>
  <h2 style="margin: 10px; text-align: center;">Custom Format</h2>
  <p style="margin: 10px; text-align: center;">Look at the Concole</p>
  <script>
    let cd = new Date()
    const y = cd.getFullYear()
    let m = cd.getMonth() + 1
    const dw = cd.getDay()
    let d = cd.getDate()
    const h = cd.getHours()
    let min = cd.getMinutes()
    const s = cd.getSeconds()

    let daysOfMonth = 0
    function monthDays() {
      var d = new Date()
      daysOfMonth = new Date(d.getMonth() + 1, d.getFullYear(), 0).getDate()
    }
    const day = (value) => {
      monthDays()
      let ad = parseInt(d + value)
      ad > 9 ? ad : ad = '0' + ad
      if(ad > daysOfMonth){
        ad = daysOfMonth
      }
      return `${y}-${m}-${ad}`
    }
    console.log(day(3))

    const format = (format) => {
      m > 9 ? m : m = '0' + m
      d > 9 ? d : d = '0' + d
      const times = {
        d: d,
        m: m,
        y: y,
        dm: `${d}-${m}`,
        md: `${m}-${d}`,
        my: `${m}-${y}`,
        ym: `${y}-${m}`,
        ymd: `${y}-${m}-${d}`,
        ydm: `${y}-${d}-${m}`,
        dmy: `${d}-${m}-${y}`,
        mdy: `${m}-${d}-${y}`,
        h: h,
        min: min,
        hmin: `${h}:${min}`,
        mins: `${min}:${s}`,
        dw: dw,
        ymdhmin: `${y}-${m}-${d} ${h}:${min}`,
        ld: cd.toLocaleDateString(),
        lt: cd.toLocaleTimeString(),
        ls: cd.toLocaleString(),
        f1: `${y}-${m}-${d} ${h}:${min}:${s}`,
        f2: `${d}-${m}-${y} ${h}:${min}:${s}`,
        f3: `${m}-${d}-${y} ${h}:${min}:${s}`
      }
      return times[format]
    }

  

    
  </script>
</body>

</html>
