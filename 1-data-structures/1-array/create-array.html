<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Array</title>
</head>
<body>
  <h2 style="margin-top:20px;text-align: center;">Create Array</h2>
  <h4 style="margin:5px;text-align: center;">Check Console (Press f12)</h4>
  <script>

    //basic
    let lang = new Array('Html','Css','Javascript')
    console.log(lang)

    //basic literal
    let literal = ['Html','Css','Javascript']
    console.log(literal)

    //array from
    let array_from = Array.from({ length: 30 }, (a, b) => b + 1)
    console.log(array_from)

    //generate with array and sort
    let array_with_sort = Array.from({ length: 30 }, (a, b) => b + 1).sort((x, y) => y - x)
    console.log(array_with_sort)

    //create flat array
    let flat_array = [[1, 2, 3], ['a', 'b', 'c'], ['a1', 'b2', 'b3']]
    console.log(flat_array)

    //create flat array from one array
    function sliceArray(arr, limit) {
      const result = []
      for (let i = 0; i < arr.length; i += limit) {
        const chunk = arr.slice(i, i + limit)
        result.push(chunk);
      }
      return result
    }
    console.log(sliceArray([1, 2, 3, 4, 5, 6, 7, 8, 9], 3))
  </script>
</body>
</html>
