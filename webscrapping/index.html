    const getHtml = async () => {
      const result = await fetch('https://dev.to/search?q=nodejs')
      const final = await result.text()
      const parser = new DOMParser()

      const links = Array.from(htmlData.querySelectorAll('a'))
      const output = links.map(item => item.href)
      console.log(output)
