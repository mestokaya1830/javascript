<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    const dog = {
      is: null,
      log() {
        console.log(this.is);
      },
      bark() {
        this.is = "woofing";
        this.log();
        return this;
      },
      walk() {
        this.is = "walking";
        this.log();
        return this;
      },
      eat() {
        this.is = "eating";
        this.log();
        return this;
      }
    }

    dog.bark().eat().walk()
  </script>
</body>

</html>
